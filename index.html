<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Mock Interview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0F172A',
            surface: '#1E293B',
            surface2: '#334155',
            primary: '#3B82F6',
            accent: '#10B981',
            warning: '#F59E0B',
            error: '#EF4444',
            text: '#F8FAFC',
            text2: '#94A3B8',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { background: #0F172A; color: #F8FAFC; font-family: 'Inter', sans-serif; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1E293B; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    
    /* Animations */
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .animate-slideUp { animation: slideUp 0.3s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.4s ease-out; }
    .animate-shake { animation: shake 0.4s ease-in-out; }
    .animate-pulse { animation: pulse 0.3s ease-in-out; }
    .animate-spin { animation: spin 1s linear infinite; }
    
    /* Score Ring */
    .score-ring { transform: rotate(-90deg); }
    .score-ring circle { transition: stroke-dashoffset 0.8s ease-out; }
    
    /* Textarea */
    textarea:focus { outline: none; box-shadow: 0 0 0 2px #3B82F6; }
    
    /* Tab underline */
    .tab-active { border-bottom: 2px solid #3B82F6; color: #F8FAFC; }
    
    /* Hide scrollbar for tabs */
    .tabs-scroll { scrollbar-width: none; -ms-overflow-style: none; }
    .tabs-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="min-h-screen">
  <div id="app" class="max-w-2xl mx-auto px-4 py-6">
    
    <!-- Header -->
    <header class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-accent flex items-center justify-center">
          <span class="text-white font-bold text-lg">EI</span>
        </div>
        <div>
          <h1 class="font-semibold text-lg">Mock Interview</h1>
          <p class="text-text2 text-sm">Practice makes perfect</p>
        </div>
      </div>
      <div id="progress-text" class="text-sm text-text2 font-mono">Q1/10</div>
    </header>
    
    <!-- Progress Bar -->
    <div class="h-1 bg-surface rounded-full mb-6 overflow-hidden">
      <div id="progress-bar" class="h-full bg-gradient-to-r from-primary to-accent transition-all duration-500" style="width: 0%"></div>
    </div>
    
    <!-- Category Tabs -->
    <div class="flex gap-1 mb-6 overflow-x-auto tabs-scroll pb-2">
      <button onclick="setCategory('general')" data-tab="general" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all text-text2 hover:bg-surface">
        馃棧锔?General
      </button>
      <button onclick="setCategory('behavioral')" data-tab="behavioral" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all text-text2 hover:bg-surface">
        馃搵 Behavioral
      </button>
      <button onclick="setCategory('technical')" data-tab="technical" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all text-text2 hover:bg-surface">
        馃捇 Technical
      </button>
      <button onclick="setCategory('pressure')" data-tab="pressure" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all text-text2 hover:bg-surface">
        馃敟 Pressure
      </button>
      <button onclick="setCategory('industry')" data-tab="industry" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all text-text2 hover:bg-surface">
        馃彚 Industry
      </button>
    </div>
    
    <!-- Main Card -->
    <div id="main-card" class="bg-surface rounded-2xl p-6 mb-6 animate-scaleIn">
      <!-- Question Section -->
      <div class="mb-6">
        <div class="flex items-center gap-3 mb-4">
          <span id="question-badge" class="px-3 py-1 bg-primary/20 text-primary rounded-full text-sm font-medium">Q1</span>
          <span id="difficulty-badge" class="px-3 py-1 rounded-full text-xs font-medium">Medium</span>
        </div>
        <h2 id="question-text" class="text-xl font-semibold leading-relaxed"></h2>
      </div>
      
      <!-- Hint (collapsible) -->
      <div id="hint-section" class="mb-6">
        <button onclick="toggleHint()" class="text-text2 text-sm hover:text-primary transition-colors flex items-center gap-2">
          <span id="hint-icon">馃挕</span>
          <span id="hint-toggle-text">Show hint</span>
        </button>
        <div id="hint-content" class="hidden mt-3 p-4 bg-surface2 rounded-xl text-text2 text-sm"></div>
      </div>
      
      <!-- Answer Input -->
      <div class="mb-4">
        <div class="relative">
          <textarea 
            id="answer-input" 
            class="w-full bg-surface2 rounded-xl p-4 text-text resize-y min-h-[150px] placeholder-text2/50 transition-all"
            placeholder="Type your answer here... (Ctrl+Enter to submit)"
            maxlength="2000"
          ></textarea>
          <div id="char-count" class="absolute bottom-3 right-4 text-xs text-text2">0/2000</div>
        </div>
      </div>
      
      <!-- Voice Input + Submit -->
      <div class="flex gap-3 mb-4">
        <button 
          id="voice-btn"
          onclick="toggleVoiceInput()"
          class="flex-shrink-0 w-14 h-14 rounded-xl bg-surface2 hover:bg-surface2/80 transition-all flex items-center justify-center text-2xl"
          title="Voice Input (English)"
        >
          <span id="voice-icon">馃帳</span>
        </button>
        <button 
          id="submit-btn" 
          onclick="submitAnswer()"
          class="flex-1 py-4 rounded-xl font-semibold bg-primary hover:bg-primary/90 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
        >
          <span id="submit-text">Submit Answer</span>
          <span id="submit-spinner" class="hidden">
            <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
          </span>
        </button>
      </div>
      <p id="voice-status" class="text-center text-sm text-text2 mb-2 hidden">馃帣锔?Listening... Speak in English</p>
    </div>
    
    <!-- Feedback Panel (hidden by default) -->
    <div id="feedback-panel" class="hidden bg-surface rounded-2xl p-6 mb-6 animate-slideUp">
      <!-- Score Overview -->
      <div class="flex items-center justify-center gap-8 mb-8">
        <!-- Score Ring -->
        <div class="relative">
          <svg class="w-28 h-28 score-ring">
            <circle cx="56" cy="56" r="48" stroke="#334155" stroke-width="8" fill="none"/>
            <circle id="score-ring-fill" cx="56" cy="56" r="48" stroke="#3B82F6" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="301.59" stroke-dashoffset="301.59"/>
          </svg>
          <div class="absolute inset-0 flex items-center justify-center">
            <span id="total-score" class="text-3xl font-bold font-mono">0</span>
          </div>
        </div>
        <div>
          <div id="score-label" class="text-lg font-semibold mb-1">Good effort!</div>
          <div id="score-sublabel" class="text-text2 text-sm">Keep practicing</div>
        </div>
      </div>
      
      <!-- Dimension Scores -->
      <div class="space-y-4 mb-8">
        <div class="score-dimension" data-dimension="content">
          <div class="flex justify-between mb-2">
            <span class="text-sm font-medium">Content & Relevance</span>
            <span class="text-sm font-mono text-primary" id="score-content">0/30</span>
          </div>
          <div class="h-2 bg-surface2 rounded-full overflow-hidden">
            <div id="bar-content" class="h-full bg-primary transition-all duration-700" style="width: 0%"></div>
          </div>
        </div>
        <div class="score-dimension" data-dimension="grammar">
          <div class="flex justify-between mb-2">
            <span class="text-sm font-medium">Grammar</span>
            <span class="text-sm font-mono text-accent" id="score-grammar">0/25</span>
          </div>
          <div class="h-2 bg-surface2 rounded-full overflow-hidden">
            <div id="bar-grammar" class="h-full bg-accent transition-all duration-700" style="width: 0%"></div>
          </div>
        </div>
        <div class="score-dimension" data-dimension="vocabulary">
          <div class="flex justify-between mb-2">
            <span class="text-sm font-medium">Vocabulary</span>
            <span class="text-sm font-mono text-warning" id="score-vocabulary">0/25</span>
          </div>
          <div class="h-2 bg-surface2 rounded-full overflow-hidden">
            <div id="bar-vocabulary" class="h-full bg-warning transition-all duration-700" style="width: 0%"></div>
          </div>
        </div>
        <div class="score-dimension" data-dimension="fluency">
          <div class="flex justify-between mb-2">
            <span class="text-sm font-medium">Fluency</span>
            <span class="text-sm font-mono text-error" id="score-fluency">0/20</span>
          </div>
          <div class="h-2 bg-surface2 rounded-full overflow-hidden">
            <div id="bar-fluency" class="h-full bg-error transition-all duration-700" style="width: 0%"></div>
          </div>
        </div>
      </div>
      
      <!-- Answer Analysis -->
      <div class="mb-8">
        <h3 class="font-semibold mb-3 flex items-center gap-2">
          <span>鉁?/span> Your Answer Analysis
        </h3>
        <div id="analysis-content" class="p-4 bg-surface2 rounded-xl text-sm space-y-2"></div>
      </div>
      
      <!-- Model Answer -->
      <div class="mb-8">
        <button onclick="toggleModelAnswer()" class="w-full p-4 bg-surface2 rounded-xl text-left flex items-center justify-between hover:bg-surface2/80 transition-all">
          <span class="font-semibold flex items-center gap-2">
            <span>馃摑</span> Model Answer
          </span>
          <span id="model-arrow" class="transition-transform">鈻?/span>
        </button>
        <div id="model-content" class="hidden mt-3 p-4 bg-accent/10 border border-accent/30 rounded-xl text-sm"></div>
      </div>
      
      <!-- Next Button -->
      <button 
        id="next-btn"
        onclick="nextQuestion()"
        class="w-full py-4 rounded-xl font-semibold bg-accent hover:bg-accent/90 transition-all flex items-center justify-center gap-2"
      >
        <span>Next Question</span>
        <span>鈫?/span>
      </button>
    </div>
    
    <!-- Summary Card (hidden by default) -->
    <div id="summary-card" class="hidden bg-surface rounded-2xl p-6 animate-scaleIn">
      <div class="text-center mb-8">
        <div class="text-6xl mb-4">馃帀</div>
        <h2 class="text-2xl font-bold mb-2">Interview Complete!</h2>
        <p class="text-text2">Here's your performance summary</p>
      </div>
      
      <div class="flex items-center justify-center gap-8 mb-8">
        <div class="relative">
          <svg class="w-36 h-36 score-ring">
            <circle cx="72" cy="72" r="60" stroke="#334155" stroke-width="10" fill="none"/>
            <circle id="final-score-ring" cx="72" cy="72" r="60" stroke="#10B981" stroke-width="10" fill="none" stroke-linecap="round" stroke-dasharray="376.99" stroke-dashoffset="376.99"/>
          </svg>
          <div class="absolute inset-0 flex items-center justify-center flex-col">
            <span id="final-score" class="text-4xl font-bold font-mono">0</span>
            <span class="text-text2 text-sm">/ 100</span>
          </div>
        </div>
      </div>
      
      <div id="summary-breakdown" class="space-y-3 mb-8"></div>
      
      <div class="flex gap-3">
        <button onclick="restartSession()" class="flex-1 py-4 rounded-xl font-semibold bg-primary hover:bg-primary/90 transition-all">
          Practice Again
        </button>
        <button onclick="shareResults()" class="px-6 py-4 rounded-xl font-semibold bg-surface2 hover:bg-surface2/80 transition-all">
          Share 馃摛
        </button>
      </div>
    </div>
    
  </div>

  <script>
    // ==========================================
    // QUESTION BANK
    // ==========================================
    const questionBank = {
      general: [
        { q: "Tell me about yourself.", hint: "Structure: Past 鈫?Present 鈫?Future. Keep it under 2 minutes.", difficulty: "easy", model: "I'm a [profession] with [X years] of experience in [field]. Currently, I work at [company] where I focus on [main responsibility]. In the future, I'm looking to [career goal]." },
        { q: "What are your greatest strengths?", hint: "Pick 2-3 strengths relevant to the role. Give concrete examples.", difficulty: "easy", model: "My key strengths are [strength 1] and [strength 2]. For example, at my current role, I [specific achievement] which resulted in [measurable outcome]." },
        { q: "What are your weaknesses?", hint: "Be honest but strategic. Show self-awareness and growth mindset.", difficulty: "medium", model: "I've struggled with [minor weakness] in the past. To address this, I've started [specific action you're taking to improve]. I'm now seeing [positive result]." },
        { q: "Why are you interested in this position?", hint: "Research the company. Connect your goals with what they offer.", difficulty: "easy", model: "I'm excited about this role because [specific aspect of company/role]. My background in [skill] aligns well with [job requirement], and I'm particularly interested in [company goal/mission]." },
        { q: "Where do you see yourself in 5 years?", hint: "Show ambition but be realistic. Align with company's growth trajectory.", difficulty: "medium", model: "In 5 years, I see myself [professional goal] with a focus on [area of expertise]. I hope to have developed [specific skills] and potentially [leadership/mentorship aspiration]." },
        { q: "Why should we hire you?", hint: "Summarize your unique value. Focus on what you can deliver.", difficulty: "medium", model: "You should hire me because I bring [key qualification 1], [key qualification 2], and [unique quality]. In this role, I'd apply these to [specific contribution you could make]." },
        { q: "What motivates you?", hint: "Be authentic. Connect to both intrinsic and extrinsic factors.", difficulty: "easy", model: "I'm primarily motivated by [intrinsic factor like learning/challenge]. I also find [extrinsic factor like team success] very fulfilling. Seeing the direct impact of my work is especially rewarding." },
        { q: "How do you handle stress and pressure?", hint: "Give a specific example. Show healthy coping mechanisms.", difficulty: "medium", model: "When facing pressure, I prioritize by making a list and breaking large tasks into smaller chunks. For example, during [stressful situation], I [specific strategy] which helped me [positive outcome]." },
        { q: "Describe your leadership style.", hint: "Adapt to the company culture. Show flexibility.", difficulty: "hard", model: "My leadership style is [style] 鈥?I believe in [core philosophy]. I prefer to [approach]. An example was when I led [project] where I helped my team [achievement]." },
        { q: "How would your colleagues describe you?", hint: "Get feedback from real colleagues if possible. Be balanced.", difficulty: "medium", model: "I think my colleagues would describe me as [positive trait 1] and [positive trait 2]. They've mentioned I [specific behavior] which I take pride in." },
        { q: "What did you like least about your last job?", hint: "Be diplomatic. Frame negatives as growth opportunities.", difficulty: "hard", model: "While I learned a lot at my last job, one area I wanted to develop was [constructive criticism]. That's actually one of the reasons I'm interested in this opportunity 鈥?[connection to new role]." },
        { q: "Are you applying for other jobs?", hint: "Be honest but strategic. Show focus and intentionality.", difficulty: "hard", model: "I am exploring a few opportunities that align with my career goals, but this position is my top priority because [specific reason]. I'm being very selective about my next move." },
        { q: "What is your expected salary?", hint: "Research market rates. Give a range, not a fixed number.", difficulty: "hard", model: "Based on my experience and research into market rates for this role, I'm looking for a range of [X-Y]. I'm flexible and open to discussion based on the overall compensation package." },
        { q: "Do you have any questions for us?", hint: "Always say yes! Ask about team, culture, and expectations.", difficulty: "easy", model: "Yes, I have a few questions: [1] What does success look like in this role in the first 90 days? [2] How would you describe the team culture? [3] What are the biggest challenges the team is currently facing?" },
        { q: "What are you most proud of in your career?", hint: "Choose something relevant and measurable if possible.", difficulty: "medium", model: "I'm most proud of [achievement]. When I faced [challenge], I [approach] which resulted in [measurable outcome]. This taught me [lesson] that I still apply today." },
      ],
      behavioral: [
        { q: "Tell me about a time you dealt with a difficult coworker.", hint: "Use STAR: Situation, Task, Action, Result. Stay professional.", difficulty: "medium", model: "At my previous job, a team member [Situation]. I needed to [Task]. I decided to [Action] by [specific steps]. As a result, [Result 鈥?positive outcome]." },
        { q: "Describe a situation where you had to meet a tight deadline.", hint: "Show time management and prioritization skills.", difficulty: "medium", model: "During a product launch at [company], we had only [timeframe] to complete [Task]. I prioritized by [strategy], worked extra hours on [aspect], and delivered on time, resulting in [positive outcome]." },
        { q: "Give an example of a goal you reached and how you achieved it.", hint: "Make it specific and measurable. Show your process.", difficulty: "easy", model: "My goal was to [specific goal]. I broke it down into [milestones]. I tracked progress by [method] and after [timeframe], I achieved [result] which exceeded expectations by [%]." },
        { q: "Tell me about a time you made a mistake.", hint: "Own it. Show accountability and learning.", difficulty: "hard", model: "Early in my career, I [Situation 鈥?the mistake]. I realized my error when [how you discovered it]. I immediately [corrective action] and [preventive measure for future]. This experience taught me [lesson]." },
        { q: "Describe a time you had to persuade others to your point of view.", hint: "Show negotiation and influence skills.", difficulty: "medium", model: "When proposing [idea] to my team, some members were skeptical because [concern]. I gathered data showing [evidence] and organized a meeting to discuss [approach]. Eventually, they agreed and we saw [result]." },
        { q: "Tell me about a time you received critical feedback.", hint: "Show openness to feedback and growth mindset.", difficulty: "medium", model: "My manager told me I needed to improve on [feedback]. At first I felt [initial reaction], but I realized it was valid. I then [specific improvement steps] and within [timeframe], I saw significant improvement in [area]." },
        { q: "Describe a situation where you had to adapt to a major change.", hint: "Show flexibility and resilience.", difficulty: "medium", model: "When [company/department] underwent [change], everything shifted including [aspects]. Instead of resisting, I [adaptation strategy], learned [new skill], and eventually [positive adaptation outcome]." },
        { q: "Tell me about a time you had to work with limited resources.", hint: "Show creativity and prioritization.", difficulty: "hard", model: "For our [project], we had [limited resources]. I had to [challenge]. I maximized impact by [strategy], used [resourcefulness example], and delivered [result] while staying within constraints." },
        { q: "Describe a time you went above and beyond.", hint: "Show initiative without burning yourself out.", difficulty: "easy", model: "When my team faced [challenging situation], I volunteered to [extra effort] even though it wasn't required. This involved [what you did] and resulted in [positive outcome for team/company]." },
        { q: "Tell me about a time you had to handle multiple priorities.", hint: "Show organization and time management.", difficulty: "easy", model: "During a busy quarter, I had to juggle [Priority 1], [Priority 2], and [Priority 3]. I used [prioritization method] and set clear boundaries by [boundary-setting example]. All deadlines were met and [result]." },
        { q: "Describe a successful team project you were part of.", hint: "Give credit to the team while highlighting your contribution.", difficulty: "easy", model: "Our team worked on [project] with the goal to [objective]. My specific role was [your contribution]. Through collaboration including [teamwork example], we achieved [result] which [impact]." },
        { q: "Tell me about a time you learned something quickly.", hint: "Show learning agility and motivation.", difficulty: "medium", model: "When I needed to learn [new skill/tool] for [reason], I had only [timeframe]. I accelerated my learning by [methods: courses, practice, asking experts]. Within [timeframe], I was able to [skill application]." },
        { q: "Describe a situation where you disagreed with your manager.", hint: "Be respectful. Show you can handle hierarchy.", difficulty: "hard", model: "I once disagreed with my manager about [issue]. I scheduled a 1:1 to discuss my perspective, presenting [your view] along with [supporting evidence]. After our conversation, we reached [resolution] and maintained a strong working relationship." },
        { q: "Tell me about a time you anticipation potential problems.", hint: "Show proactive thinking and risk management.", difficulty: "hard", model: "While working on [project], I noticed [potential risk]. I raised concerns to the team in advance and proposed [preventive solution]. Because we addressed it early, we avoided [would-be problem]." },
        { q: "Describe a time you had to deliver bad news.", hint: "Show communication skills and empathy.", difficulty: "hard", model: "When I had to inform [stakeholder] that [bad news], I prepared by [preparation]. I was honest about [situation] while also presenting [possible solutions/mitigation]. They appreciated my [quality] and we moved forward with [outcome]." },
      ],
      technical: [
        { q: "Walk me through a project you're most proud of.", hint: "Structure: Problem 鈫?Solution 鈫?Your Role 鈫?Impact.", difficulty: "medium", model: "The project I'm most proud of was [Project Name] at [Company]. The problem was [challenge]. My solution was [approach] using [technologies]. As lead developer, I [specific contribution]. The result was [measurable impact]." },
        { q: "How do you handle technical challenges or bugs?", hint: "Show your debugging process and persistence.", difficulty: "medium", model: "When facing a tough bug, I first [initial approach], then [deeper investigation]. If stuck, I [escalation strategy: docs, forums, teammates]. For example, a recent issue with [bug] took me [time] to solve using [method]." },
        { q: "Explain a complex technical concept to someone non-technical.", hint: "Use analogies. Show communication skills.", difficulty: "hard", model: "Think of [everyday object] like a [analogy]. Just like [how it works in real life], in computers we [technical explanation]. This matters because [why it's important]." },
        { q: "What technologies are you currently learning and why?", hint: "Show growth mindset. Be specific about your learning path.", difficulty: "easy", model: "I'm currently learning [Technology] because [reason: career growth, interest, relevance]. I'm doing this through [learning resources] and my goal is to [specific application] within [timeframe]." },
        { q: "Describe your experience with [specific technology]?", hint: "Be honest about proficiency. Give concrete examples.", difficulty: "medium", model: "I've used [Technology] for [duration] primarily for [use case]. My experience includes [specific features/tasks]. For instance, I built [example project] which taught me [skill/concept]." },
        { q: "How do you stay updated with technology trends?", hint: "Show passion for learning. Mention specific resources.", difficulty: "easy", model: "I stay updated through [specific resources: blogs, newsletters, courses, communities]. I particularly enjoy [specific platform] because [reason]. When I find something interesting, I [application method]." },
        { q: "Tell me about a technical decision you had to make recently.", hint: "Show decision-making process and trade-off consideration.", difficulty: "hard", model: "Recently I had to choose between [Option A] and [Option B] for [project]. I evaluated them based on [criteria: scalability, maintainability, timeline]. I chose [A/B] because [reasoning], and so far it's proven correct because [outcome]." },
        { q: "How do you ensure code quality and best practices?", hint: "Mention code reviews, testing, documentation.", difficulty: "medium", model: "I follow several practices: [1] Writing clean, documented code. [2] Peer code reviews. [3] Unit and integration testing. [4] Using linters and formatters. These help maintain [specific benefits]." },
        { q: "Describe your experience with teamwork in technical projects.", hint: "Show collaboration and communication skills.", difficulty: "easy", model: "In my team, we use [collaboration tools/methods]. I typically work on [your role] while coordinating with [other roles]. A successful collaboration was when [example] which resulted in [outcome]." },
        { q: "What would you do if you couldn't meet a technical deadline?", hint: "Show realistic planning and communication.", difficulty: "hard", model: "If I foresaw a deadline issue, I would [immediate action]. I'd communicate early with [stakeholders] about [options]. My solutions would include [possible workarounds] while setting realistic expectations for [final deliverable]." },
      ],
      pressure: [
        { q: "Tell me about your biggest professional failure.", hint: "Be honest but strategic. Focus on learning.", difficulty: "hard", model: "One significant failure was [situation]. Looking back, I see I should have [what you'd do differently]. I learned that [lesson], and now I always [preventive practice]." },

    // ==========================================
    // ADVANCED VOCABULARY FOR SCORING
    // ==========================================
    const advancedVocabulary = [
      'achieve', 'accomplish', 'implement', 'leverage', 'optimize', 'streamline',
      'facilitate', 'delegate', 'prioritize', 'strategize', 'innovate', 'pioneer',
      'collaborate', 'mentor', 'spearhead', 'transform', 'enhance', 'elevate',
      'comprehensive', 'strategic', 'proactive', 'dynamic', 'efficient', 'robust',
      'scalable', 'seamless', 'compelling', 'insightful', 'nuanced', 'pivotal',
      'synergy', 'paradigm', 'framework', 'milestone', 'breakthrough', 'tangible',
      'deliverable', 'stakeholder', 'roadmap', 'iteration', 'agile', 'pivot'
    ];

    const commonMistakes = [
      { pattern: /\bi\s+was\s+working\b/gi, correction: 'I was working', explanation: 'Use past continuous for ongoing past actions' },
      { pattern: /\bdidnt\b/gi, correction: "didn't", explanation: "Use apostrophe for contractions" },
      { pattern: /\bcant\b/gi, correction: "can't", explanation: "Use apostrophe for contractions" },
      { pattern: /\bwont\b/gi, correction: "won't", explanation: "Use apostrophe for contractions" },
      { pattern: /\bi\s+am\s+working\b/gi, correction: 'I am working', explanation: 'Present continuous for current actions' },
      { pattern: /\btheir\s+is\b/gi, correction: "there's", explanation: "Use 'there is' not 'their is'" },
      { pattern: /\balot\b/gi, correction: 'a lot', explanation: "'A lot' is two words" },
      { pattern: /\bshould\s+of\b/gi, correction: 'should have', explanation: "Use 'have' not 'of' after modal verbs" },
      { pattern: /\bcould\s+of\b/gi, correction: 'could have', explanation: "Use 'have' not 'of' after modal verbs" },

    // ==========================================
    // FUNCTIONS
    // ==========================================
    
    function setCategory(cat) {
      state.category = cat;
      state.usedQuestions.clear();
      state.answers = [];
      state.sessionScores = [];
      state.currentIndex = 0;
      
      // Update tab UI
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('tab-active', 'text-text');
        btn.classList.add('text-text2');
      });
      document.querySelector(`[data-tab="${cat}"]`).classList.add('tab-active');
      document.querySelector(`[data-tab="${cat}"]`).classList.remove('text-text2');
      
      // Hide feedback & summary, show main
      elements.feedbackPanel.classList.add('hidden');
      elements.summaryCard.classList.add('hidden');
      elements.mainCard.classList.remove('hidden');
      
      loadQuestion();
    }

    function getRandomQuestion() {
      const questions = questionBank[state.category];
      const available = questions.filter((_, i) => !state.usedQuestions.has(i));
      
      if (available.length === 0) {
        // Reset if we've used all questions
        state.usedQuestions.clear();
        return getRandomQuestion();
      }
      
      const randomIndex = Math.floor(Math.random() * available.length);
      const originalIndex = questions.indexOf(available[randomIndex]);
      state.usedQuestions.add(originalIndex);
      
      return { ...available[randomIndex], originalIndex };
    }

    function loadQuestion() {
      state.currentQuestion = getRandomQuestion();
      state.currentIndex++;
      state.isAnswered = false;
      
      // Update question display
      elements.questionBadge.textContent = `Q${state.currentIndex}`;
      elements.questionText.textContent = state.currentQuestion.q;
      
      // Difficulty badge
      const diff = state.currentQuestion.difficulty;
      elements.difficultyBadge.textContent = diff.charAt(0).toUpperCase() + diff.slice(1);
      elements.difficultyBadge.className = 'px-3 py-1 rounded-full text-xs font-medium';
      if (diff === 'easy') {
        elements.difficultyBadge.classList.add('bg-green-500/20', 'text-green-400');
      } else if (diff === 'medium') {
        elements.difficultyBadge.classList.add('bg-yellow-500/20', 'text-yellow-400');
      } else {
        elements.difficultyBadge.classList.add('bg-red-500/20', 'text-red-400');
      }
      
      // Reset hint
      elements.hintContent.classList.add('hidden');
      elements.hintContent.textContent = state.currentQuestion.hint;
      elements.hintIcon.textContent = '馃挕';

      elements.submitBtn.disabled = false;
      elements.submitText.textContent = 'Submit Answer';

    function toggleHint() {
      const isHidden = elements.hintContent.classList.contains('hidden');
      elements.hintContent.classList.toggle('hidden');
      elements.hintIcon.textContent = isHidden ? '馃檲' : '馃挕';
      elements.hintToggleText.textContent = isHidden ? 'Hide hint' : 'Show hint';
    }

    function calculateScore(answer) {
      const text = answer.toLowerCase();
      const words = text.split(/\s+/);
      const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
      
      // Content Score (30)
      let contentScore = 0;
      const hasStructure = text.includes('because') || text.includes('therefore') || text.includes('first') || text.includes('result');
      const hasDetail = words.length > 50;
      const hasConclusion = text.includes('conclusion') || text.includes('finally') || text.includes('in summary');
      
      if (hasStructure) contentScore += 10;
      if (hasDetail) contentScore += 12;
      if (hasConclusion) contentScore += 8;
      contentScore = Math.min(30, contentScore + 5); // Base score
      
      // Grammar Score (25)
      let grammarScore = 25;
      commonMistakes.forEach(mistake => {
        const matches = text.match(mistake.pattern);
        if (matches) grammarScore -= matches.length * 3;
      });
      grammarScore = Math.max(0, grammarScore);
      
      // Vocabulary Score (25)
      let vocabScore = 5;
      advancedVocabulary.forEach(word => {
        if (text.includes(word)) vocabScore += 3;
      });
      vocabScore = Math.min(25, vocabScore);
      
      // Fluency Score (20)
      const avgSentenceLength = words.length / Math.max(1, sentences.length);
      let fluencyScore = 10;
      if (avgSentenceLength > 10 && avgSentenceLength < 30) fluencyScore += 5;
      if (words.length > 80) fluencyScore += 5;
      
      return {
        content: Math.min(30, Math.round(contentScore)),
        grammar: Math.max(0, Math.round(grammarScore)),
        vocabulary: Math.min(25, Math.round(vocabScore)),
        fluency: Math.min(20, Math.round(fluencyScore))
      };
    }

    function getScoreFeedback(scores) {
      const total = scores.content + scores.grammar + scores.vocabulary + scores.fluency;
      let label, sublabel;
      
      if (total >= 90) { label = 'Outstanding! 馃専'; sublabel = 'Exceptional response'; }
      else if (total >= 75) { label = 'Great job! 馃憤'; sublabel = 'Above expectations'; }
      else if (total >= 60) { label = 'Good effort! 馃挭'; sublabel = 'Meeting expectations'; }
      else if (total >= 45) { label = 'Keep practicing 馃搱'; sublabel = 'Below expectations'; }
      else { label = 'Needs work 馃敡'; sublabel = 'Keep practicing'; }
      
      return { label, sublabel, total };
    }

    function analyzeAnswer(answer) {
      const text = answer.toLowerCase();
      const analysis = [];
      
      // Check for structure words
      const structureWords = ['because', 'therefore', 'first', 'second', 'finally', 'result', 'however'];
      const found = structureWords.filter(w => text.includes(w));
      if (found.length > 0) {
        analysis.push({ type: 'positive', text: `鉁?Good use of transitions: "${found.join('", "')}"` });
      }
      
      // Check answer length
      const wordCount = text.split(/\s+/).filter(w => w.length > 0).length;
      if (wordCount < 50) {
        analysis.push({ type: 'warning', text: `鈿?Your answer could be more detailed (${wordCount} words). Aim for 80-150 words.` });
      } else if (wordCount > 50) {
        analysis.push({ type: 'positive', text: `鉁?Good length (${wordCount} words)` });
      }
      
      // Check for advanced vocabulary
      const foundVocab = advancedVocabulary.filter(w => text.includes(w));
      if (foundVocab.length >= 3) {
        analysis.push({ type: 'positive', text: `鉁?Strong vocabulary: "${foundVocab.slice(0, 5).join('", "')}"` });
      }
      
      // Check for common mistakes
      const mistakes = [];
      commonMistakes.forEach(mistake => {
        const matches = text.match(mistake.pattern);
        if (matches) {
          matches.forEach(() => {
            mistakes.push({ word: matches[0], correction: mistake.correction, explanation: mistake.explanation });
          });
        }
      });
      
      if (mistakes.length > 0) {
        mistakes.slice(0, 3).forEach(m => {
          analysis.push({ type: 'error', text: `鉁?"${m.word}" 鈫?"${m.correction}" (${m.explanation})` });
        });
      }
      
      // Check for STAR behavior questions (in behavioral category)
      if (state.category === 'behavioral') {
        const hasSituation = text.includes('when') || text.includes('at') || text.includes('during');
        const hasAction = text.includes('i decided') || text.includes('i chose') || text.includes('i worked');
        const hasResult = text.includes('result') || text.includes('outcome') || text.includes('as a result');
        
        if (!hasSituation) analysis.push({ type: 'warning', text: '馃挕 Try to describe the SITUATION (context) first' });
        if (!hasAction) analysis.push({ type: 'warning', text: '馃挕 Describe the ACTION you took specifically' });
        if (!hasResult) analysis.push({ type: 'warning', text: '馃挕 Conclude with the RESULT (outcome)' });
      }
      
      if (analysis.length === 0) {
        analysis.push({ type: 'positive', text: '鉁?Solid response! Keep it up.' });
      }
      
      return analysis;
    }

    function submitAnswer() {
      const answer = elements.answerInput.value.trim();
      
      if (answer.length < 20) {
        elements.answerInput.classList.add('animate-shake');
        setTimeout(() => elements.answerInput.classList.remove('animate-shake'), 400);
        return;
      }
      
      state.isAnswered = true;
      elements.answerInput.disabled = true;
      elements.submitBtn.disabled = true;
      elements.submitText.textContent = 'Evaluating...';
      elements.submitSpinner.classList.remove('hidden');
      
      // Simulate processing delay
      setTimeout(() => {
        const scores = calculateScore(answer);
        const feedback = getScoreFeedback(scores);
        const analysis = analyzeAnswer(answer);
        
        // Store
        state.answers.push(answer);
        state.sessionScores.push(scores);
        
        // Show feedback
        showFeedback(scores, feedback, analysis, answer);
      }, 800);
    }

    function showFeedback(scores, feedback, analysis, answer) {
      elements.mainCard.classList.add('animate-scaleIn');
      elements.feedbackPanel.classList.remove('hidden');
      
      // Update scores
      document.getElementById('score-content').textContent = `${scores.content}/30`;
      document.getElementById('score-grammar').textContent = `${scores.grammar}/25`;
      document.getElementById('score-vocabulary').textContent = `${scores.vocabulary}/25`;
      document.getElementById('score-fluency').textContent = `${scores.fluency}/20`;
      
      // Animate bars
      setTimeout(() => {
        document.getElementById('bar-content').style.width = `${(scores.content / 30) * 100}%`;
        document.getElementById('bar-grammar').style.width = `${(scores.grammar / 25) * 100}%`;
        document.getElementById('bar-vocabulary').style.width = `${(scores.vocabulary / 25) * 100}%`;
        document.getElementById('bar-fluency').style.width = `${(scores.fluency / 20) * 100}%`;
      }, 100);
      
      // Score ring
      const circumference = 2 * Math.PI * 48;
      const offset = circumference - (feedback.total / 100) * circumference;
      elements.scoreRingFill.style.strokeDashoffset = offset;
      elements.scoreRingFill.style.stroke = feedback.total >= 75 ? '#10B981' : feedback.total >= 50 ? '#F59E0B' : '#EF4444';
      
      elements.totalScore.textContent = feedback.total;
      elements.scoreLabel.textContent = feedback.label;
      elements.scoreLabel.style.color = feedback.total >= 75 ? '#10B981' : feedback.total >= 50 ? '#F59E0B' : '#EF4444';
      elements.scoreSublabel.textContent = feedback.sublabel;
      
      // Analysis
      elements.analysisContent.innerHTML = analysis.map(a => {
        const color = a.type === 'positive' ? 'text-accent' : a.type === 'error' ? 'text-error' : 'text-warning';
        return `<p class="${color}">${a.text}</p>`;
      }).join('');
      
      // Model answer
      elements.modelContent.textContent = state.currentQuestion.model;
      
      // Scroll to feedback
      elements.feedbackPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function toggleModelAnswer() {
      elements.modelContent.classList.toggle('hidden');
      document.getElementById('model-arrow').style.transform = 
        elements.modelContent.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';

    function nextQuestion() {
      if (state.currentIndex >= state.totalQuestions) {
        endSession();
      } else {
        loadQuestion();
        elements.feedbackPanel.classList.add('hidden');
        elements.mainCard.classList.remove('hidden');
      }
    }

    function endSession() {
      elements.mainCard.classList.add('hidden');
      elements.feedbackPanel.classList.add('hidden');
      elements.summaryCard.classList.remove('hidden');
      
      // Calculate final score
      const totalScores = state.sessionScores.reduce((acc, s) => ({
        content: acc.content + s.content,
        grammar: acc.grammar + s.grammar,
        vocabulary: acc.vocabulary + s.vocabulary,
        fluency: acc.fluency + s.fluency
      }), { content: 0, grammar: 0, vocabulary: 0, fluency: 0 });
      
      const avgTotal = Math.round(
        (totalScores.content / state.totalQuestions / 30 +
        totalScores.grammar / state.totalQuestions / 25 +
        totalScores.vocabulary / state.totalQuestions / 25 +
        totalScores.fluency / state.totalQuestions / 20) * 100
      );
      
      // Animate final score
      setTimeout(() => {
        const circumference = 2 * Math.PI * 60;
        const offset = circumference - (avgTotal / 100) * circumference;
        elements.finalScoreRing.style.strokeDashoffset = offset;
        elements.finalScoreRing.style.stroke = avgTotal >= 75 ? '#10B981' : avgTotal >= 50 ? '#F59E0B' : '#EF4444';
      }, 100);
      
      elements.finalScore.textContent = avgTotal;
      
      // Breakdown
      const categories = ['Content', 'Grammar', 'Vocabulary', 'Fluency'];
      const weights = [30, 25, 25, 20];
      const avgScores = [
        Math.round(totalScores.content / state.totalQuestions),
        Math.round(totalScores.grammar / state.totalQuestions),
        Math.round(totalScores.vocabulary / state.totalQuestions),
        Math.round(totalScores.fluency / state.totalQuestions)
      ];
      
      elements.summaryBreakdown.innerHTML = categories.map((cat, i) => `
        <div class="flex items-center justify-between p-3 bg-surface2 rounded-xl">
          <span class="text-sm">${cat}</span>
          <div class="flex items-center gap-3">
            <div class="w-24 h-2 bg-bg rounded-full overflow-hidden">
              <div class="h-full ${i === 0 ? 'bg-primary' : i === 1 ? 'bg-accent' : i === 2 ? 'bg-warning' : 'bg-error'}" 
                   style="width: ${(avgScores[i] / weights[i]) * 100}%"></div>
            </div>
            <span class="text-sm font-mono w-12 text-right">${avgScores[i]}/${weights[i]}</span>
          </div>
        </div>
      `).join('');
      
      // Hide progress bar
      elements.progressBar.style.width = '100%';
    }

    function restartSession() {
      state.currentIndex = 0;
      state.answers = [];
      state.sessionScores = [];
      setCategory(state.category);
    }

    // ==========================================
    // VOICE INPUT
    // ==========================================
    let voiceRecognition = null;
    let isVoiceActive = false;

    function toggleVoiceInput() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('Voice input is not supported in your browser. Please use Chrome or Edge.');
        return;
      }

      if (isVoiceActive) {
        stopVoiceInput();
      } else {
        startVoiceInput();
      }
    }

    function startVoiceInput() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      voiceRecognition = new SpeechRecognition();
      voiceRecognition.lang = 'en-US';
      voiceRecognition.continuous = true;
      voiceRecognition.interimResults = true;
      voiceRecognition.maxAlternatives = 1;

      voiceRecognition.onstart = () => {
        isVoiceActive = true;
        document.getElementById('voice-icon').textContent = '馃敶';
        document.getElementById('voice-btn').classList.add('animate-pulse', 'bg-error/20');
        document.getElementById('voice-status').classList.remove('hidden');
        elements.answerInput.disabled = false;
      };

      voiceRecognition.onresult = (event) => {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        elements.answerInput.value = transcript;
        elements.charCount.textContent = `${transcript.length}/2000`;
      };

      voiceRecognition.onerror = (event) => {
        console.log('Speech recognition error:', event.error);
        if (event.error === 'not-allowed') {
          alert('Microphone access denied. Please allow microphone access to use voice input.');
        }
        stopVoiceInput();
      };

      voiceRecognition.onend = () => {
        if (isVoiceActive) {
          // Auto-restart if still supposed to be active
          voiceRecognition.start();
        }
      };

      voiceRecognition.start();
    }

    function stopVoiceInput() {
      if (voiceRecognition) {
        isVoiceActive = false;
        voiceRecognition.stop();
        voiceRecognition = null;
      }
      document.getElementById('voice-icon').textContent = '馃帳';
      document.getElementById('voice-btn').classList.remove('animate-pulse', 'bg-error/20');
      document.getElementById('voice-status').classList.add('hidden');
    }

    // ==========================================
    // EVENT LISTENERS
    // ==========================================
    
    elements.answerInput.addEventListener('input', function() {
      const len = this.value.length;
      elements.charCount.textContent = `${len}/2000`;
      elements.charCount.className = len > 1800 ? 'absolute bottom-3 right-4 text-xs text-error' : 'absolute bottom-3 right-4 text-xs text-text2';
    });
    
    elements.answerInput.addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        submitAnswer();
      }
    });
    
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && !elements.feedbackPanel.classList.contains('hidden')) {
        nextQuestion();
      }
    });

    // ==========================================
    // INIT
    // ==========================================
    setCategory('general');
  </script>
</body>
</html>
