<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Mock Interview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0F172A',
            surface: '#1E293B',
            surface2: '#334155',
            primary: '#3B82F6',
            accent: '#10B981',
            warning: '#F59E0B',
            error: '#EF4444',
            text: '#F8FAFC',
            text2: '#94A3B8',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { background: #0F172A; color: #F8FAFC; font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1E293B; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-slideUp { animation: slideUp 0.3s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.4s ease-out; }
    .animate-shake { animation: shake 0.4s ease-in-out; }
    .animate-pulse { animation: pulse 0.3s ease-in-out; }
    .animate-spin { animation: spin 1s linear infinite; }
    .score-ring { transform: rotate(-90deg); }
    .score-ring circle { transition: stroke-dashoffset 0.8s ease-out; }
    textarea:focus { outline: none; box-shadow: 0 0 0 2px #3B82F6; }
    .tab-active { border-bottom: 2px solid #3B82F6; color: #F8FAFC; }
    .tabs-scroll { scrollbar-width: none; -ms-overflow-style: none; }
    .tabs-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="min-h-screen">
  <div id="app" class="max-w-2xl mx-auto px-4 py-6">
    <header class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-accent flex items-center justify-center">
          <span class="text-white font-bold text-lg">EI</span>
        </div>
        <div>
          <h1 class="font-semibold text-lg">Mock Interview</h1>
          <p class="text-text2 text-sm">Practice makes perfect</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div id="timer-display" class="text-sm font-mono text-text2">0:00</div>
        <div id="progress-text" class="text-sm text-text2 font-mono">Q1/5</div>
      </div>
    </header>
    <div class="h-1 bg-surface rounded-full mb-6 overflow-hidden">
      <div id="progress-bar" class="h-full bg-gradient-to-r from-primary to-accent transition-all duration-500" style="width: 0%"></div>
    </div>
    <div class="flex gap-1 mb-6 overflow-x-auto tabs-scroll pb-2">
      <button onclick="setCategory('general')" data-tab="general" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all text-text2 hover:bg-surface">
        General
      </button>
      <button onclick="setCategory('behavioral')" data-tab="behavioral" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all text-text2 hover:bg-surface">
        Behavioral
      </button>
      <button onclick="setCategory('technical')" data-tab="technical" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all text-text2 hover:bg-surface">
        Technical
      </button>
      <button onclick="setCategory('pressure')" data-tab="pressure" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all text-text2 hover:bg-surface">
        Pressure
      </button>
      <button onclick="setCategory('industry')" data-tab="industry" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all text-text2 hover:bg-surface">
        Industry
      </button>
    </div>
    <div id="main-card" class="bg-surface rounded-2xl p-6 mb-6 animate-scaleIn">
      <div class="mb-6">
        <div class="flex items-center gap-3 mb-4">
          <span id="question-badge" class="px-3 py-1 bg-primary/20 text-primary rounded-full text-sm font-medium">Q1</span>
          <span id="difficulty-badge" class="px-3 py-1 rounded-full text-xs font-medium">Medium</span>
        </div>
        <h2 id="question-text" class="text-xl font-semibold leading-relaxed"></h2>
      </div>
      <div id="hint-section" class="mb-6">
        <button onclick="toggleHint()" class="text-text2 text-sm hover:text-primary transition-colors flex items-center gap-2">
          <span id="hint-icon">Hint</span>
          <span id="hint-toggle-text"></span>
        </button>
        <div id="hint-content" class="hidden mt-3 p-4 bg-surface2 rounded-xl text-text2 text-sm"></div>
      </div>
      <div class="mb-4">
        <div class="relative">
          <textarea 
            id="answer-input" 
            class="w-full bg-surface2 rounded-xl p-4 text-text resize-y min-h-[150px] placeholder-text2/50 transition-all"
            placeholder="Type your answer here... (Ctrl+Enter to submit)"
            maxlength="2000"
          ></textarea>
          <div id="char-count" class="absolute bottom-3 right-4 text-xs text-text2">0/2000</div>
        </div>
      </div>
      <div class="flex gap-3 mb-4">
        <button id="voice-btn" onclick="toggleVoiceInput()" class="flex-shrink-0 w-14 h-14 rounded-xl bg-surface2 hover:bg-surface2/80 transition-all flex items-center justify-center text-2xl" title="Voice Input (English)">
          <span id="voice-icon">Voice</span>
        </button>
        <button id="submit-btn" onclick="submitAnswer()" class="flex-1 py-4 rounded-xl font-semibold bg-primary hover:bg-primary/90 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
          <span id="submit-text">Submit Answer</span>
          <span id="submit-spinner" class="hidden">
            <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
          </span>
        </button>
      </div>
      <p id="voice-status" class="text-center text-sm text-text2 mb-2 hidden">Listening... Speak in English</p>
    </div>
    <div id="feedback-panel" class="hidden bg-surface rounded-2xl p-6 mb-6 animate-slideUp">
      <div class="flex items-center justify-center gap-8 mb-8">
        <div class="relative">
          <svg class="w-28 h-28 score-ring">
            <circle cx="56" cy="56" r="48" stroke="#334155" stroke-width="8" fill="none"/>
            <circle id="score-ring-fill" cx="56" cy="56" r="48" stroke="#3B82F6" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="301.59" stroke-dashoffset="301.59"/>
          </svg>
          <div class="absolute inset-0 flex items-center justify-center">
            <span id="total-score" class="text-3xl font-bold font-mono">0</span>
          </div>
        </div>
        <div>
          <div id="score-label" class="text-lg font-semibold mb-1">Good effort!</div>
          <div id="score-sublabel" class="text-text2 text-sm">Keep practicing</div>
        </div>
      </div>
      <div class="space-y-4 mb-8">
        <div>
          <div class="flex justify-between mb-2">
            <span class="text-sm font-medium">Content and Relevance</span>
            <span class="text-sm font-mono text-primary" id="score-content">0/30</span>
          </div>
          <div class="h-2 bg-surface2 rounded-full overflow-hidden">
            <div id="bar-content" class="h-full bg-primary transition-all duration-700" style="width: 0%"></div>
          </div>
        </div>
        <div>
          <div class="flex justify-between mb-2">
            <span class="text-sm font-medium">Grammar</span>
            <span class="text-sm font-mono text-accent" id="score-grammar">0/25</span>
          </div>
          <div class="h-2 bg-surface2 rounded-full overflow-hidden">
            <div id="bar-grammar" class="h-full bg-accent transition-all duration-700" style="width: 0%"></div>
          </div>
        </div>
        <div>
          <div class="flex justify-between mb-2">
            <span class="text-sm font-medium">Vocabulary</span>
            <span class="text-sm font-mono text-warning" id="score-vocabulary">0/25</span>
          </div>
          <div class="h-2 bg-surface2 rounded-full overflow-hidden">
            <div id="bar-vocabulary" class="h-full bg-warning transition-all duration-700" style="width: 0%"></div>
          </div>
        </div>
        <div>
          <div class="flex justify-between mb-2">
            <span class="text-sm font-medium">Fluency</span>
            <span class="text-sm font-mono text-error" id="score-fluency">0/20</span>
          </div>
          <div class="h-2 bg-surface2 rounded-full overflow-hidden">
            <div id="bar-fluency" class="h-full bg-error transition-all duration-700" style="width: 0%"></div>
          </div>
        </div>
      </div>
      <div class="mb-8">
        <h3 class="font-semibold mb-3">Your Answer Analysis</h3>
        <div id="analysis-content" class="p-4 bg-surface2 rounded-xl text-sm space-y-2"></div>
      </div>
      <div class="mb-8">
        <button onclick="toggleModelAnswer()" class="w-full p-4 bg-surface2 rounded-xl text-left flex items-center justify-between hover:bg-surface2/80 transition-all">
          <span class="font-semibold">Model Answer</span>
          <span id="model-arrow" class="transition-transform">+</span>
        </button>
        <div id="model-content" class="hidden mt-3 p-4 bg-accent/10 border border-accent/30 rounded-xl text-sm"></div>
      </div>
      <button id="next-btn" onclick="nextQuestion()" class="w-full py-4 rounded-xl font-semibold bg-accent hover:bg-accent/90 transition-all flex items-center justify-center gap-2">
        <span>Next Question</span>
        <span>-&gt;</span>
      </button>
    </div>
    <div id="summary-card" class="hidden bg-surface rounded-2xl p-6 animate-scaleIn">
      <div class="text-center mb-8">
        <div class="text-6xl mb-4">*</div>
        <h2 class="text-2xl font-bold mb-2">Interview Complete!</h2>
        <p class="text-text2">Here is your performance summary</p>
      </div>
      <div class="flex items-center justify-center gap-8 mb-8">
        <div class="relative">
          <svg class="w-36 h-36 score-ring">
            <circle cx="72" cy="72" r="60" stroke="#334155" stroke-width="10" fill="none"/>
            <circle id="final-score-ring" cx="72" cy="72" r="60" stroke="#10B981" stroke-width="10" fill="none" stroke-linecap="round" stroke-dasharray="376.99" stroke-dashoffset="376.99"/>
          </svg>
          <div class="absolute inset-0 flex items-center justify-center flex-col">
            <span id="final-score" class="text-4xl font-bold font-mono">0</span>
            <span class="text-text2 text-sm">/ 100</span>
          </div>
        </div>
      </div>
      <div id="summary-breakdown" class="space-y-3 mb-8"></div>
      <div class="flex gap-3">
        <button onclick="restartSession()" class="flex-1 py-4 rounded-xl font-semibold bg-primary hover:bg-primary/90 transition-all">
          Practice Again
        </button>
        <button onclick="shareResults()" class="px-6 py-4 rounded-xl font-semibold bg-surface2 hover:bg-surface2/80 transition-all">
          Share
        </button>
      </div>
    </div>
  </div>
  <script>
    const questionBank = {
      general: [
        { q: "Tell me about yourself.", hint: "Structure: Past -> Present -> Future. Keep it under 2 minutes.", difficulty: "easy", model: "I am a [profession] with [X years] of experience in [field]. Currently, I work at [company] where I focus on [main responsibility]. In the future, I am looking to [career goal]." },
        { q: "What are your greatest strengths?", hint: "Pick 2-3 strengths relevant to the role. Give concrete examples.", difficulty: "easy", model: "My key strengths are [strength 1] and [strength 2]. For example, at my current role, I [specific achievement] which resulted in [measurable outcome]." },
        { q: "What are your weaknesses?", hint: "Be honest but strategic. Show self-awareness and growth mindset.", difficulty: "medium", model: "I have struggled with [minor weakness] in the past. To address this, I have started [specific action you are taking to improve]. I am now seeing [positive result]." },
        { q: "Why are you interested in this position?", hint: "Research the company. Connect your goals with what they offer.", difficulty: "easy", model: "I am excited about this role because [specific aspect of company/role]. My background in [skill] aligns well with [job requirement], and I am particularly interested in [company goal/mission]." },
        { q: "Where do you see yourself in 5 years?", hint: "Show ambition but be realistic. Align with company growth trajectory.", difficulty: "medium", model: "In 5 years, I see myself [professional goal] with a focus on [area of expertise]. I hope to have developed [specific skills] and potentially [leadership/mentorship aspiration]." },
      ],
      behavioral: [
        { q: "Tell me about a time you dealt with a difficult coworker.", hint: "Use STAR: Situation, Task, Action, Result. Stay professional.", difficulty: "medium", model: "At my previous job, a team member [Situation]. I needed to [Task]. I decided to [Action] by [specific steps]. As a result, [Result - positive outcome]." },
        { q: "Describe a situation where you had to meet a tight deadline.", hint: "Show time management and prioritization skills.", difficulty: "medium", model: "During a product launch at [company], we had only [timeframe] to complete [Task]. I prioritized by [strategy], worked extra hours on [aspect], and delivered on time, resulting in [positive outcome]." },
        { q: "Give an example of a goal you reached and how you achieved it.", hint: "Make it specific and measurable. Show your process.", difficulty: "easy", model: "My goal was to [specific goal]. I broke it down into [milestones]. I tracked progress by [method] and after [timeframe], I achieved [result] which exceeded expectations by [%]." },
        { q: "Tell me about a time you made a mistake.", hint: "Own it. Show accountability and learning.", difficulty: "hard", model: "Early in my career, I [Situation - the mistake]. I realized my error when [how you discovered it]. I immediately [corrective action] and [preventive measure for future]. This experience taught me [lesson]." },
        { q: "Describe a time you went above and beyond.", hint: "Show initiative without burning yourself out.", difficulty: "easy", model: "When my team faced [challenging situation], I volunteered to [extra effort] even though it was not required. This involved [what you did] and resulted in [positive outcome for team/company]." },
      ],
      technical: [
        { q: "Walk me through a project you are most proud of.", hint: "Structure: Problem -> Solution -> Your Role -> Impact.", difficulty: "medium", model: "The project I am most proud of was [Project Name] at [Company]. The problem was [challenge]. My solution was [approach] using [technologies]. As lead developer, I [specific contribution]. The result was [measurable impact]." },
        { q: "How do you handle technical challenges or bugs?", hint: "Show your debugging process and persistence.", difficulty: "medium", model: "When facing a tough bug, I first [initial approach], then [deeper investigation]. If stuck, I [escalation strategy: docs, forums, teammates]. For example, a recent issue with [bug] took me [time] to solve using [method]." },
        { q: "What technologies are you currently learning and why?", hint: "Show growth mindset. Be specific about your learning path.", difficulty: "easy", model: "I am currently learning [Technology] because [reason: career growth, interest, relevance]. I am doing this through [learning resources] and my goal is to [specific application] within [timeframe]." },
        { q: "How do you ensure code quality and best practices?", hint: "Mention code reviews, testing, documentation.", difficulty: "medium", model: "I follow several practices: [1] Writing clean, documented code. [2] Peer code reviews. [3] Unit and integration testing. [4] Using linters and formatters. These help maintain [specific benefits]." },
        { q: "Describe your experience with teamwork in technical projects.", hint: "Show collaboration and communication skills.", difficulty: "easy", model: "In my team, we use [collaboration tools/methods]. I typically work on [your role] while coordinating with [other roles]. A successful collaboration was when [example] which resulted in [outcome]." },
      ],
      pressure: [
        { q: "Tell me about your biggest professional failure.", hint: "Be honest but strategic. Focus on learning.", difficulty: "hard", model: "One significant failure was [situation]. Looking back, I see I should have [what you would do differently]. I learned that [lesson], and now I always [preventive practice]." },
        { q: "Why should we hire you over more experienced candidates?", hint: "Turn it into a strength. Show unique value.", difficulty: "hard", model: "While experience matters, I bring [unique advantage 1: fresh perspective, latest skills, etc.] and [advantage 2: specific relevant achievement]. I am also known for [quality] which helps me [specific contribution]." },
        { q: "What is your biggest weakness that might affect this role?", hint: "Be honest but frame it constructively.", difficulty: "hard", model: "I sometimes [specific weakness] which can affect [area]. To manage this, I have implemented [coping strategy]. I am actively working on [improvement effort] and have seen progress in [result]." },
        { q: "If I gave you an impossible deadline, what would you do?", hint: "Show negotiation skills and realistic expectations management.", difficulty: "hard", model: "I would first [acknowledge the challenge]. Then I would ask to discuss [scope, resources, trade-offs]. Rather than promising the impossible, I would propose [realistic alternative] with a focus on [most critical deliverable]." },
        { q: "Sell me this pen.", hint: "Focus on benefits, not features. Qualify the customer needs first.", difficulty: "hard", model: "[Interviewer], before I sell you this pen, may I ask - what are you looking for in a writing instrument? [Based on response] Great, because this pen [feature] means [benefit] for you specifically. It is perfect for [use case]." },
      ],
      industry: [
        { q: "What do you know about our company?", hint: "Research thoroughly. Mention specific products, culture, or recent news.", difficulty: "medium", model: "I know [Company] is [brief description]. What impresses me most is [specific achievement or value]. Your recent [news/product] shows [insight], and I would love to contribute to [specific aspect]." },
        { q: "Why do you want to work for our company specifically?", hint: "Go beyond generic reasons. Be specific about what attracts you.", difficulty: "medium", model: "I am drawn to [Company] because [specific reason 1: culture/product/mission]. Additionally, [reason 2], which aligns perfectly with my interest in [your goal]." },
        { q: "What trends in our industry excite you the most?", hint: "Show genuine interest. Follow industry news.", difficulty: "hard", model: "What excites me most is [trend], because [why it matters]. I find [specific development] particularly interesting as it could [impact]. I have been following this through [resource]." },
        { q: "What challenges do you think our industry faces?", hint: "Show awareness and thoughtfulness. Do not be overly negative.", difficulty: "hard", model: "One significant challenge is [issue] due to [reason]. I believe [company/industry] is well-positioned to address this through [approach]. It is actually one reason I am interested in contributing to this space." },
        { q: "How do you see AI/technology changing this industry?", hint: "Show vision and tech literacy.", difficulty: "hard", model: "Technology, especially AI, is transforming this industry by [specific way]. I see this leading to [opportunities]. At [Company], this could mean [specific application] which aligns with my interest in [related area]." },
      ]
    };

    const advancedVocabulary = [
      'achieve', 'accomplish', 'implement', 'leverage', 'optimize', 'streamline',
      'facilitate', 'delegate', 'prioritize', 'strategize', 'innovate', 'pioneer',
      'collaborate', 'mentor', 'spearhead', 'transform', 'enhance', 'elevate',
      'comprehensive', 'strategic', 'proactive', 'dynamic', 'efficient', 'robust',
      'scalable', 'seamless', 'compelling', 'insightful', 'nuanced', 'pivotal',
      'synergy', 'paradigm', 'framework', 'milestone', 'breakthrough', 'tangible',
      'deliverable', 'stakeholder', 'roadmap', 'iteration', 'agile', 'pivot'
    ];

    const commonMistakes = [
      { pattern: /\bi\s+was\s+working\b/gi, correction: 'I was working', explanation: 'Use past continuous for ongoing past actions' },
      { pattern: /\bdidnt\b/gi, correction: "did not", explanation: "Use full form, not contraction" },
      { pattern: /\bcant\b/gi, correction: "cannot", explanation: "Use full form, not contraction" },
      { pattern: /\bwont\b/gi, correction: "will not", explanation: "Use full form, not contraction" },
      { pattern: /\bi\s+am\s+working\b/gi, correction: 'I am working', explanation: 'Present continuous for current actions' },
      { pattern: /\balot\b/gi, correction: 'a lot', explanation: "A lot is two words" },
      { pattern: /\bshould\s+of\b/gi, correction: 'should have', explanation: "Use 'have' not 'of' after modal verbs" },
      { pattern: /\bcould\s+of\b/gi, correction: 'could have', explanation: "Use 'have' not 'of' after modal verbs" },
    ];

    let state = {
      category: 'general',
      currentQuestion: null,
      currentIndex: 0,
      totalQuestions: 5,
      usedQuestions: new Set(),
      answers: [],
      sessionScores: [],
      isAnswered: false,
      timerSeconds: 0,
      timerInterval: null
    };

    const el = {
      questionBadge: document.getElementById('question-badge'),
      difficultyBadge: document.getElementById('difficulty-badge'),
      questionText: document.getElementById('question-text'),
      hintSection: document.getElementById('hint-section'),
      hintContent: document.getElementById('hint-content'),
      hintIcon: document.getElementById('hint-icon'),
      hintToggleText: document.getElementById('hint-toggle-text'),
      answerInput: document.getElementById('answer-input'),
      charCount: document.getElementById('char-count'),
      submitBtn: document.getElementById('submit-btn'),
      submitText: document.getElementById('submit-text'),
      submitSpinner: document.getElementById('submit-spinner'),
      feedbackPanel: document.getElementById('feedback-panel'),
      mainCard: document.getElementById('main-card'),
      progressBar: document.getElementById('progress-bar'),
      progressText: document.getElementById('progress-text'),
      timerDisplay: document.getElementById('timer-display'),
      summaryCard: document.getElementById('summary-card'),
      nextBtn: document.getElementById('next-btn'),
      scoreRingFill: document.getElementById('score-ring-fill'),
      totalScore: document.getElementById('total-score'),
      scoreLabel: document.getElementById('score-label'),
      scoreSublabel: document.getElementById('score-sublabel'),
      analysisContent: document.getElementById('analysis-content'),
      modelContent: document.getElementById('model-content'),
      finalScore: document.getElementById('final-score'),
      finalScoreRing: document.getElementById('final-score-ring'),
      summaryBreakdown: document.getElementById('summary-breakdown')
    };

    function setCategory(cat) {
      state.category = cat;
      state.usedQuestions.clear();
      state.answers = [];
      state.sessionScores = [];
      state.currentIndex = 0;
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('tab-active', 'text-text');
        btn.classList.add('text-text2');
      });
      document.querySelector('[data-tab="' + cat + '"]').classList.add('tab-active');
      document.querySelector('[data-tab="' + cat + '"]').classList.remove('text-text2');
      el.feedbackPanel.classList.add('hidden');
      el.summaryCard.classList.add('hidden');
      el.mainCard.classList.remove('hidden');
      loadQuestion();
    }

    function startTimer() {
      stopTimer();
      state.timerSeconds = 0;
      updateTimerDisplay();
      state.timerInterval = setInterval(() => {
        state.timerSeconds++;
        updateTimerDisplay();
      }, 1000);
    }

    function stopTimer() {
      if (state.timerInterval) {
        clearInterval(state.timerInterval);
        state.timerInterval = null;
      }
    }

    function updateTimerDisplay() {
      const mins = Math.floor(state.timerSeconds / 60);
      const secs = state.timerSeconds % 60;
      el.timerDisplay.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
    }

    function getRandomQuestion() {
      const questions = questionBank[state.category];
      const available = questions.filter((_, i) => !state.usedQuestions.has(i));
      if (available.length === 0) {
        state.usedQuestions.clear();
        return getRandomQuestion();
      }
      const randomIndex = Math.floor(Math.random() * available.length);
      const originalIndex = questions.indexOf(available[randomIndex]);
      state.usedQuestions.add(originalIndex);
      return { ...available[randomIndex], originalIndex };
    }

    function loadQuestion() {
      state.currentQuestion = getRandomQuestion();
      state.currentIndex++;
      state.isAnswered = false;
      el.questionBadge.textContent = 'Q' + state.currentIndex;
      el.questionText.textContent = state.currentQuestion.q;
      const diff = state.currentQuestion.difficulty;
      el.difficultyBadge.textContent = diff.charAt(0).toUpperCase() + diff.slice(1);
      el.difficultyBadge.className = 'px-3 py-1 rounded-full text-xs font-medium';
      if (diff === 'easy') el.difficultyBadge.classList.add('bg-green-500/20', 'text-green-400');
      else if (diff === 'medium') el.difficultyBadge.classList.add('bg-yellow-500/20', 'text-yellow-400');
      else el.difficultyBadge.classList.add('bg-red-500/20', 'text-red-400');
      el.hintContent.classList.add('hidden');
      el.hintContent.textContent = state.currentQuestion.hint;
      el.hintIcon.textContent = 'Show';
      el.hintToggleText.textContent = 'hint';
      el.answerInput.value = '';
      el.charCount.textContent = '0/2000';
      el.answerInput.disabled = false;
      el.submitBtn.disabled = false;
      el.submitText.textContent = 'Submit Answer';
      el.submitSpinner.classList.add('hidden');
      const progress = ((state.currentIndex - 1) / state.totalQuestions) * 100;
      el.progressBar.style.width = progress + '%';
      el.progressText.textContent = 'Q' + state.currentIndex + '/' + state.totalQuestions;
      el.feedbackPanel.classList.add('hidden');
      startTimer();
      el.mainCard.classList.remove('animate-scaleIn');
      void el.mainCard.offsetWidth;
      el.mainCard.classList.add('animate-scaleIn');
      setTimeout(() => el.answerInput.focus(), 100);
    }

    function toggleHint() {
      const isHidden = el.hintContent.classList.contains('hidden');
      el.hintContent.classList.toggle('hidden');
      el.hintIcon.textContent = isHidden ? 'Hide' : 'Show';
      el.hintToggleText.textContent = isHidden ? '' : 'hint';
    }

    function calculateScore(answer) {
      const text = answer.toLowerCase();
      const words = text.split(/\s+/);
      const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
      let contentScore = 0;
      const hasStructure = text.includes('because') || text.includes('therefore') || text.includes('first') || text.includes('result');
      const hasDetail = words.length > 50;
      const hasConclusion = text.includes('conclusion') || text.includes('finally') || text.includes('in summary');
      if (hasStructure) contentScore += 10;
      if (hasDetail) contentScore += 12;
      if (hasConclusion) contentScore += 8;
      contentScore = Math.min(30, contentScore + 5);
      let grammarScore = 25;
      commonMistakes.forEach(mistake => {
        const matches = text.match(mistake.pattern);
        if (matches) grammarScore -= matches.length * 3;
      });
      grammarScore = Math.max(0, grammarScore);
      let vocabScore = 5;
      advancedVocabulary.forEach(word => {
        if (text.includes(word)) vocabScore += 3;
      });
      vocabScore = Math.min(25, vocabScore);
      const avgSentenceLength = words.length / Math.max(1, sentences.length);
      let fluencyScore = 10;
      if (avgSentenceLength > 10 && avgSentenceLength < 30) fluencyScore += 5;
      if (words.length > 80) fluencyScore += 5;
      return {
        content: Math.min(30, Math.round(contentScore)),
        grammar: Math.max(0, Math.round(grammarScore)),
        vocabulary: Math.min(25, Math.round(vocabScore)),
        fluency: Math.min(20, Math.round(fluencyScore))
      };
    }

    function getScoreFeedback(scores) {
      const total = scores.content + scores.grammar + scores.vocabulary + scores.fluency;
      let label, sublabel;
      if (total >= 90) { label = 'Outstanding!'; sublabel = 'Exceptional response'; }
      else if (total >= 75) { label = 'Great job!'; sublabel = 'Above expectations'; }
      else if (total >= 60) { label = 'Good effort!'; sublabel = 'Meeting expectations'; }
      else if (total >= 45) { label = 'Keep practicing'; sublabel = 'Below expectations'; }
      else { label = 'Needs work'; sublabel = 'Keep practicing'; }
      return { label, sublabel, total };
    }

    function analyzeAnswer(answer) {
      const text = answer.toLowerCase();
      const analysis = [];
      const structureWords = ['because', 'therefore', 'first', 'second', 'finally', 'result', 'however'];
      const found = structureWords.filter(w => text.includes(w));
      if (found.length > 0) {
        analysis.push({ type: 'positive', text: 'Good use of transitions: ' + found.join(', ') });
      }
      const wordCount = text.split(/\s+/).filter(w => w.length > 0).length;
      if (wordCount < 50) {
        analysis.push({ type: 'warning', text: 'Your answer could be more detailed (' + wordCount + ' words). Aim for 80-150 words.' });
      } else if (wordCount > 50) {
        analysis.push({ type: 'positive', text: 'Good length (' + wordCount + ' words)' });
      }
      const foundVocab = advancedVocabulary.filter(w => text.includes(w));
      if (foundVocab.length >= 3) {
        analysis.push({ type: 'positive', text: 'Strong vocabulary: ' + foundVocab.slice(0, 5).join(', ') });
      }
      const mistakes = [];
      commonMistakes.forEach(mistake => {
        const matches = text.match(mistake.pattern);
        if (matches) {
          matches.forEach(() => {
            mistakes.push({ word: matches[0], correction: mistake.correction, explanation: mistake.explanation });
          });
        }
      });
      if (mistakes.length > 0) {
        mistakes.slice(0, 3).forEach(m => {
          analysis.push({ type: 'error', text: '"' + m.word + '" should be "' + m.correction + '" (' + m.explanation + ')' });
        });
      }
      if (state.category === 'behavioral') {
        const hasSituation = text.includes('when') || text.includes('at') || text.includes('during');
        const hasAction = text.includes('i decided') || text.includes('i chose') || text.includes('i worked');
        const hasResult = text.includes('result') || text.includes('outcome') || text.includes('as a result');
        if (!hasSituation) analysis.push({ type: 'warning', text: 'Try to describe the SITUATION (context) first' });
        if (!hasAction) analysis.push({ type: 'warning', text: 'Describe the ACTION you took specifically' });
        if (!hasResult) analysis.push({ type: 'warning', text: 'Conclude with the RESULT (outcome)' });
      }
      if (analysis.length === 0) {
        analysis.push({ type: 'positive', text: 'Solid response! Keep it up.' });
      }
      return analysis;
    }

    function submitAnswer() {
      const answer = el.answerInput.value.trim();
      if (answer.length < 20) {
        el.answerInput.classList.add('animate-shake');
        setTimeout(() => el.answerInput.classList.remove('animate-shake'), 400);
        return;
      }
      state.isAnswered = true;
      stopTimer();
      el.answerInput.disabled = true;
      el.submitBtn.disabled = true;
      el.submitText.textContent = 'Evaluating...';
      el.submitSpinner.classList.remove('hidden');
      setTimeout(() => {
        const scores = calculateScore(answer);
        const feedback = getScoreFeedback(scores);
        const analysis = analyzeAnswer(answer);
        state.answers.push(answer);
        state.sessionScores.push(scores);
        showFeedback(scores, feedback, analysis, answer, state.timerSeconds);
      }, 800);
    }

    function showFeedback(scores, feedback, analysis, timeSpent) {
      el.mainCard.classList.add('animate-scaleIn');
      el.feedbackPanel.classList.remove('hidden');
      const mins = Math.floor(timeSpent / 60);
      const secs = timeSpent % 60;
      const timeLabel = mins > 0 ? mins + 'm ' + secs + 's' : secs + 's';
      el.scoreSublabel.textContent = 'Time: ' + timeLabel + ' | ' + feedback.sublabel;
      document.getElementById('score-content').textContent = scores.content + '/30';
      document.getElementById('score-grammar').textContent = scores.grammar + '/25';
      document.getElementById('score-vocabulary').textContent = scores.vocabulary + '/25';
      document.getElementById('score-fluency').textContent = scores.fluency + '/20';
      setTimeout(() => {
        document.getElementById('bar-content').style.width = (scores.content / 30) * 100 + '%';
        document.getElementById('bar-grammar').style.width = (scores.grammar / 25) * 100 + '%';
        document.getElementById('bar-vocabulary').style.width = (scores.vocabulary / 25) * 100 + '%';
        document.getElementById('bar-fluency').style.width = (scores.fluency / 20) * 100 + '%';
      }, 100);
      const circumference = 2 * Math.PI * 48;
      const offset = circumference - (feedback.total / 100) * circumference;
      el.scoreRingFill.style.strokeDashoffset = offset;
      el.scoreRingFill.style.stroke = feedback.total >= 75 ? '#10B981' : feedback.total >= 50 ? '#F59E0B' : '#EF4444';
      el.totalScore.textContent = feedback.total;
      el.scoreLabel.textContent = feedback.label;
      el.scoreLabel.style.color = feedback.total >= 75 ? '#10B981' : feedback.total >= 50 ? '#F59E0B' : '#EF4444';
      el.scoreSublabel.textContent = feedback.sublabel;
      el.analysisContent.innerHTML = analysis.map(a => {
        const color = a.type === 'positive' ? 'text-accent' : a.type === 'error' ? 'text-error' : 'text-warning';
        return '<p class="' + color + '">' + a.text + '</p>';
      }).join('');
      el.modelContent.textContent = state.currentQuestion.model;
      el.feedbackPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function toggleModelAnswer() {
      el.modelContent.classList.toggle('hidden');
      document.getElementById('model-arrow').style.transform =
        el.modelContent.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
    }

    function nextQuestion() {
      if (state.currentIndex >= state.totalQuestions) {
        endSession();
      } else {
        loadQuestion();
        el.feedbackPanel.classList.add('hidden');
        el.mainCard.classList.remove('hidden');
      }
    }

    function endSession() {
      el.mainCard.classList.add('hidden');
      el.feedbackPanel.classList.add('hidden');
      el.summaryCard.classList.remove('hidden');
      const totalScores = state.sessionScores.reduce((acc, s) => ({
        content: acc.content + s.content,
        grammar: acc.grammar + s.grammar,
        vocabulary: acc.vocabulary + s.vocabulary,
        fluency: acc.fluency + s.fluency
      }), { content: 0, grammar: 0, vocabulary: 0, fluency: 0 });
      const avgTotal = Math.round(
        (totalScores.content / state.totalQuestions / 30 +
        totalScores.grammar / state.totalQuestions / 25 +
        totalScores.vocabulary / state.totalQuestions / 25 +
        totalScores.fluency / state.totalQuestions / 20) * 100
      );
      setTimeout(() => {
        const circumference = 2 * Math.PI * 60;
        const offset = circumference - (avgTotal / 100) * circumference;
        el.finalScoreRing.style.strokeDashoffset = offset;
        el.finalScoreRing.style.stroke = avgTotal >= 75 ? '#10B981' : avgTotal >= 50 ? '#F59E0B' : '#EF4444';
      }, 100);
      el.finalScore.textContent = avgTotal;
      const categories = ['Content', 'Grammar', 'Vocabulary', 'Fluency'];
      const weights = [30, 25, 25, 20];
      const avgScores = [
        Math.round(totalScores.content / state.totalQuestions),
        Math.round(totalScores.grammar / state.totalQuestions),
        Math.round(totalScores.vocabulary / state.totalQuestions),
        Math.round(totalScores.fluency / state.totalQuestions)
      ];
      el.summaryBreakdown.innerHTML = categories.map((cat, i) =>
        '<div class="flex items-center justify-between p-3 bg-surface2 rounded-xl">' +
          '<span class="text-sm">' + cat + '</span>' +
          '<div class="flex items-center gap-3">' +
            '<div class="w-24 h-2 bg-bg rounded-full overflow-hidden">' +
              '<div class="h-full ' + (i === 0 ? 'bg-primary' : i === 1 ? 'bg-accent' : i === 2 ? 'bg-warning' : 'bg-error') + '" ' +
                   'style="width:' + (avgScores[i] / weights[i]) * 100 + '%"></div>' +
            '</div>' +
            '<span class="text-sm font-mono w-12 text-right">' + avgScores[i] + '/' + weights[i] + '</span>' +
          '</div>' +
        '</div>'
      ).join('');
      el.progressBar.style.width = '100%';
    }

    function restartSession() {
      state.currentIndex = 0;
      state.answers = [];
      state.sessionScores = [];
      setCategory(state.category);
    }

    function shareResults() {
      const total = el.finalScore.textContent;
      const text = 'I just completed an English Mock Interview and scored ' + total + '/100! Try it yourself:';
      navigator.clipboard.writeText(text).then(() => {
        alert('Results copied to clipboard!');
      });
    }

    let voiceRecognition = null;
    let isVoiceActive = false;

    function toggleVoiceInput() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('Voice input is not supported in your browser. Please use Chrome or Edge.');
        return;
      }
      if (isVoiceActive) {
        stopVoiceInput();
      } else {
        startVoiceInput();
      }
    }

    function startVoiceInput() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      voiceRecognition = new SpeechRecognition();
      voiceRecognition.lang = 'en-US';
      voiceRecognition.continuous = true;
      voiceRecognition.interimResults = true;
      voiceRecognition.maxAlternatives = 1;
      voiceRecognition.onstart = () => {
        isVoiceActive = true;
        document.getElementById('voice-icon').textContent = 'Recording';
        document.getElementById('voice-btn').classList.add('animate-pulse', 'bg-error/20');
        document.getElementById('voice-status').classList.remove('hidden');
        el.answerInput.disabled = false;
      };
      voiceRecognition.onresult = (event) => {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        el.answerInput.value = transcript;
        el.charCount.textContent = transcript.length + '/2000';
      };
      voiceRecognition.onerror = (event) => {
        if (event.error === 'not-allowed') {
          alert('Microphone access denied. Please allow microphone access to use voice input.');
        }
        stopVoiceInput();
      };
      voiceRecognition.onend = () => {
        if (isVoiceActive) voiceRecognition.start();
      };
      voiceRecognition.start();
    }

    function stopVoiceInput() {
      if (voiceRecognition) {
        isVoiceActive = false;
        voiceRecognition.stop();
        voiceRecognition = null;
      }
      document.getElementById('voice-icon').textContent = 'Voice';
      document.getElementById('voice-btn').classList.remove('animate-pulse', 'bg-error/20');
      document.getElementById('voice-status').classList.add('hidden');
    }

    el.answerInput.addEventListener('input', function() {
      const len = this.value.length;
      el.charCount.textContent = len + '/2000';
      el.charCount.className = len > 1800 ? 'absolute bottom-3 right-4 text-xs text-error' : 'absolute bottom-3 right-4 text-xs text-text2';
    });
    el.answerInput.addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        submitAnswer();
      }
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && !el.feedbackPanel.classList.contains('hidden')) {
        nextQuestion();
      }
    });

    setCategory('general');
  </script>
</body>
